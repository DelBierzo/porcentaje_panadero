    clear: false
    clear-children: true
    title-card-clickable: false
    title-card-button-overlay: false
    child-margin-top: 0em
    title: CALCULADORA PORCENTAJE PANADERO
    title-card:
      type: custom:custom-features-card
      features:
        - type: custom:service-call
          entries:
            - type: slider
              entity_id: number.masa_final_objetivo
              icon: mdi:scale
              unit_of_measurement: g
              tap_action:
                action: perform-action
                perform_action: number.set_value
                data:
                  value: "{{ value | float }}"
                target:
                  entity_id: number.masa_final_objetivo
              range:
                - 100
                - 10000
              step: 50
              styles: |-
                :host {
                  flex-basis: 100%;
                  --color: var(--green-color);
                }
                .icon {
                  display: none;
                }
                .background {
                  background: var(--green-color);
                  --color: var(--green-color);
                }
              thumb: default
            - type: spinbox
              entity_id: number.masa_final_objetivo
              icon: mdi:scale
              unit_of_measurement: g
              tap_action:
                action: perform-action
                perform_action: number.set_value
                data:
                  value: "{{ value | float }}"
                target:
                  entity_id: number.masa_final_objetivo
              range:
                - 100
                - 10000
              step: 10
              styles: |
                :host {
                  flex-flow: row;
                }
                .icon {
                  display: none;
                }
                .label {
                  font-size: 1.4rem !important;
                }    
              debounce_time: 100
              label: "{{ value | float }} g"
          styles: ""
      features_position: bottom
      transparent: false
      feature_height: 36
      card_mod:
        style:
          ha-tile-info$: |
            .secondary {
              font-size: 1.4rem !important;
            }
    icon: mdi:calculator
    padding: 0em
  - type: custom:expander-card
    cards:
      - type: markdown
        visibility:
          - condition: numeric_state
            above: 0
            entity: number.tang_zhong
        content: >
          {% set sensor = 'sensor.tang_zhong_total' %} {% set sensor_masa =
          'number.masa_final_objetivo' %} {% set sensor_pct =
          'number.tang_zhong' %} {% set total = states(sensor) | float(0) %} {%
          set masa_obj = states(sensor_masa) | float(1000) | round(0) %} {% set
          pct_tz = states(sensor_pct) | float(0) | round(0) %} {% set harina =
          state_attr(sensor, 'harina_g') | float(0) %} {% set liquido =
          state_attr(sensor, 'liquido_total_g') | float(0) %} {% set leche =
          state_attr(sensor, 'leche_utilizada_g') | float(0) %} {% set agua_asis
          = state_attr(sensor, 'agua_asistencia_g') | float(0) | round(1) %} {%
          set base = state_attr(sensor, 'base_solicitada') | default('agua',
          true) %}

          {% if total > 0 %}
            ### <font color= '#ff9800'>**Tang-Zhong:**</font>  *{{ total }} g* ( {{ pct_tz }}% )
            
            * **HARINA A ESCALDAR: {{ harina }} g** *(HARINA 1)*
            * **LÍQUIDO REQUERIDO (1:5): {{ liquido }} g** *(BASE: {{ base | upper }})*
            
            {% if base == 'leche' and leche > 0 and agua_asis > 0 %}
            ---
            
            * **LECHE: {{ leche }} g**
            * **AGUA: {{ agua_asis }} g**

          <font color='#ff9800'>⚠️ **¡AVISO DE ESCALDADO MIXTO!**

          La fórmula no tiene suficiente leche, hay que añadir agua.</font>
            {% endif %}
            
            {# Si la leche llega no se muestra ninguna línea de líquido #}
          {% endif %}
      - type: entities
        show_header_toggle: false
        entities:
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: masa madre
            row:
              type: section
              label: " "
              card_mod:
                style: |
                  .divider {
                    display: flex;
                    align-items: center;
                  }
                  .label::before {
                    content: "REFRESCO MASA MADRE";
                    font-weight: bold;
                    color: var(--accent-color);
                  }
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: biga
            row:
              type: section
              label: " "
              card_mod:
                style: |
                  .divider {
                    display: flex;
                    align-items: center;
                  }
                  .label::before {
                    content: "ELABORACIÓN BIGA";
                    font-weight: bold;
                    color: var(--accent-color);
                  }
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: poolish
            row:
              type: section
              label: " "
              card_mod:
                style: |
                  .divider {
                    display: flex;
                    align-items: center;
                  }
                  .label::before {
                    content: "ELABORACIÓN POOLISH";
                    font-weight: bold;
                    color: var(--accent-color);
                  }
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: masa madre
            row:
              type: custom:template-entity-row
              entity: sensor.pan_inoculo_masa_madre
              name: >-
                • INÓCULO MASA MADRE ({{
                states('sensor.porcentaje_inoculo_receta') }}%)
              state: "{{ states('sensor.pan_inoculo_masa_madre') }} g"
              tap_action:
                action: none
              card_mod:
                style: |
                  div.state {
                    font-size: 1.4rem !important;
                  }
                  .info {
                    font-size: 14px !important;
                    font-weight: bold !important;
                  }             
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - entity: select.tipo_de_prefermento
