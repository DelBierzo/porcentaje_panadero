type: vertical-stack
cards:
  - type: custom:expander-card
    cards:
      - type: custom:porcentaje-panadero-calculadora-card
    clear: false
    clear-children: true
    title-card-clickable: true
    title-card-button-overlay: false
    child-margin-top: 0em
    title: CALCULADORA PORCENTAJE PANADERO
    icon: mdi:calculator
    padding: 0em
  - type: custom:expander-card
    title: FÓRMULA
    cards:
      - type: custom:porcentaje-panadero-formula-card
    clear-children: true
    padding: 0em
    title-card-clickable: true
    child-margin-top: 0em
    icon: mdi:file-document-edit
  - type: custom:expander-card
    cards:
      - type: custom:porcentaje-panadero-control-termico-card
    title-card-button-overlay: false
    clear-children: true
    title-card-padding: 0em
    padding: 0em
    child-margin-top: 0em
    title-card-clickable: true
    title: CONTROL TÉRMICO
    icon: mdi:thermometer
  - type: custom:expander-card
    title: TEMPERATURA / LEVADO / TOTALES
    cards:
      - type: custom:porcentaje-panadero-info-card
    clear-children: true
    padding: 0em
    child-margin-top: 0em
    title-card-clickable: true
    icon: mdi:information
  - type: custom:expander-card
    title: PANEL DE CONTROL
    cards:
      - type: custom:porcentaje-panadero-control-panel-card
    clear-children: true
    padding: 0em
    child-margin-top: 0em
    title-card-clickable: true
    icon: mdi:view-dashboard-edit
