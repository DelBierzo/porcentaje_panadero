                  {% set sensor = 'sensor.tang_zhong_total' %} {% set
                  sensor_masa = 'number.masa_final_objetivo' %} {% set
                  sensor_pct = 'number.tang_zhong' %} {% set total =
                  states(sensor) | float(0) %} {% set masa_obj =
                  states(sensor_masa) | float(1000) | round(0) %} {% set pct_tz
                  = states(sensor_pct) | float(0) | round(0) %} {% set harina =
