type: vertical-stack
cards:
  - type: entities
    show_header_toggle: false
    entities:
      - entity: number.masa_final_objetivo
      - type: section
        label: HARINA
      - entity: select.harina_principal_1
        name: 🥇 Marca Harina 1
      - entity: select.harina_secundaria_2
        name: 🥈 Marca Harina 2
      - entity: select.harina_secundaria_3
        name: 🥉 Marca Harina 3
      - type: divider
      - entity: number.harina_1
      - entity: number.harina_2
      - entity: number.harina_3
      - entity: number.agua_hidratacion
      - entity: number.sal
      - entity: number.levadura
      - type: conditional
        conditions:
          - entity: button.alternar_fresca_seca
            state: fresca
        row:
          entity: button.alternar_fresca_seca
          name: Levadura Fresca
          icon: mdi:yeast
      - type: conditional
        conditions:
          - entity: button.alternar_fresca_seca
            state: seca
        row:
          entity: button.alternar_fresca_seca
          name: Levadura Seca
          icon: mdi:yeast
      - entity: number.prefermento
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          entity: select.tipo_de_prefermento
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state_not: masa madre
        row:
          entity: number.levadura_prefermento
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: masa madre
        row:
          entity: number.inoculo_masa_madre
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: masa madre
        row:
          entity: number.hidratacion_masa_madre
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          entity: select.harina_para_prefermento
      - entity: switch.habilitar_ingredientes_extras
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.tang_zhong
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.tang_zhong
            above: 0
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
          - condition: numeric_state
            entity: number.leche_liquida
            above: 0
          - entity: button.alternar_tang_zhong_agua_leche
            state: agua
        row:
          entity: button.alternar_tang_zhong_agua_leche
          name: Tang-Zhong (Agua)
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.tang_zhong
            above: 0
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
          - condition: numeric_state
            entity: number.leche_liquida
            above: 0
          - entity: button.alternar_tang_zhong_agua_leche
            state: leche
        row:
          entity: button.alternar_tang_zhong_agua_leche
          name: Tang-Zhong (Leche)
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.malta
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.azucar
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.aove
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.mantequilla
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.leche_en_polvo
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.leche_liquida
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.huevo
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
          - condition: or
            conditions:
              - condition: numeric_state
                above: 0
                entity: number.leche_liquida
              - condition: numeric_state
                above: 0
                entity: number.huevo
        row:
          entity: switch.calcular_hidratacion_real
    title: CALCULADORA
  - title: FÓRMULA
    type: custom:porcentaje-panadero-formula-card
  - type: entities
    title: CONTROL TÉRMICO
    show_header_toggle: false
    entities:
      - type: section
        label: TEMPERATURA AGUA AMASADO
      - entity: number.temperatura_objetivo_masa
        name: Temp. Objetivo Masa
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state_not: "true"
        row:
          entity: number.temperatura_ambiente
          name: Temp. Ambiente
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
        row:
          entity: sensor.temperatura_real
          name: Temp. Ambiente
      - entity: number.temperatura_harina
        name: Temp. Harina
      - type: conditional
        conditions:
          - condition: numeric_state
            above: 0
            entity: number.prefermento
        row:
          entity: number.temperatura_prefermento
          name: Temp. Prefermento
      - entity: number.temperatura_friccion_amasadora
        name: Temp. Amasadora
      - type: section
        label: TEMPERATURA LEVADO
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state_not: "true"
        row:
          entity: number.temperatura_ambiente
          name: Ajuste manual
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
        row:
          entity: select.origen_temperatura_levado
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
          - condition: state
            entity: select.origen_temperatura_levado
            state: Sensor Físico
        row:
          entity: sensor.temperatura_real
          name: Temperatura Ambiente
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
          - condition: state
            entity: select.origen_temperatura_levado
            state: Manual (Slider)
        row:
          entity: number.temperatura_ambiente
          name: Ajuste Manual
  - title: INFORMACIÓN
    type: custom:porcentaje-panadero-info-card
  - title: PANEL DE CONTROL
    type: custom:porcentaje-panadero-control-panel-card
