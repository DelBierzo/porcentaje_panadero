type: vertical-stack
cards:
  - type: entities
    entities:
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.tang_zhong
            above: 0
        row:
          type: custom:hui-element
          card_type: markdown
          card_mod:
            style: |
              ha-card {
                background: transparent !important;
                --ha-card-background: transparent !important;
                box-shadow: none !important;
                border: none !important;
              }
          content: >
            {% set sensor = 'sensor.tang_zhong_total' %}  {% set sensor_masa =
            'number.masa_final_objetivo' %}  {% set sensor_pct =
            'number.tang_zhong' %}  {% set total = states(sensor) | float(0) %} 
            {% set masa_obj = states(sensor_masa) | float(1000) | round(0) %} 
            {% set pct_tz = states(sensor_pct) | float(0) | round(0) %}  {% set
            harina = state_attr(sensor, 'harina_g') | float(0) %}  {% set
            liquido = state_attr(sensor, 'liquido_total_g') | float(0) %}  {%
            set leche = state_attr(sensor, 'leche_utilizada_g') | float(0) %} 
            {% set agua_asis = state_attr(sensor, 'agua_asistencia_g') |
            float(0) | round(1) %}  {% set base = state_attr(sensor,
            'base_solicitada') | default('agua', true) %}

            {% if total > 0 %}
              ### <font color= '#ff9800'>**Tang-Zhong:**</font>  *{{ total }} g* ( {{ pct_tz }}% )
              
              * **HARINA A ESCALDAR: {{ harina }} g**
                *({{ state_attr('sensor.pan_harina_prefermento', 'nombre_harina_real') | upper }})*
              
              * **LÍQUIDO REQUERIDO (1:5): {{ liquido }} g**
                *(BASE: {{ base | upper }})*
              
              {% if base == 'leche' and leche > 0 and agua_asis > 0 %}
              ---
              
              * **LECHE: {{ leche }} g**
              * **AGUA: {{ agua_asis }} g**

              <font color='#ff9800'>⚠️ **!AVISO DE ESCALDADO MIXTO!**

              La fórmula no tiene suficiente leche, hay que añadir agua.</font>
              {% endif %}
              
            {% endif %}
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: masa madre
        row:
          type: section
          label: " "
          card_mod:
            style: |
              .divider {
                display: flex;
                align-items: center;
              }
              .label::before {
                content: "REFRESCO MASA MADRE";
                color: var(--accent-color);
              }
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: biga
        row:
          type: section
          label: " "
          card_mod:
            style: |
              .divider {
                display: flex;
                align-items: center;
              }
              .label::before {
                content: "ELABORACIÓN BIGA";
                color: var(--accent-color);
              }
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: poolish
        row:
          type: section
          label: " "
          card_mod:
            style: |
              .divider {
                display: flex;
                align-items: center;
              }
              .label::before {
                content: "ELABORACIÓN POOLISH";
                color: var(--accent-color);
              }
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: masa madre
        row:
          type: custom:template-entity-row
          entity: sensor.pan_inoculo_masa_madre
          name: >-
            INÓCULO MASA MADRE ({{ states('sensor.porcentaje_inoculo_receta')
            }}%)
          state: "{{ states('sensor.pan_inoculo_masa_madre') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - entity: select.tipo_de_prefermento
            state_not: masa madre
        row:
          type: custom:template-entity-row
          entity: sensor.pan_levadura_prefermento
          name: >-
            LEVADURA {{ states('button.alternar_fresca_seca') | upper }} ({{
            states('number.levadura_prefermento') }}%)
          state: "{{ states('sensor.pan_levadura_prefermento') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_harina_prefermento
          tap_action:
            action: none
          name: >-
            {{ state_attr('sensor.pan_harina_prefermento', 'nombre_harina_real')
            | upper }} ({{ states('sensor.harina_prefermentada') }}%)
          state: "{{ states('sensor.pan_harina_prefermento') }} g"
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_agua_prefermento
          name: AGUA ({{ states('sensor.hidratacion_del_prefermento') }}%)
          state: "{{ states('sensor.pan_agua_prefermento') }} g"
          tap_action:
            action: none
      - type: section
        label: " "
        card_mod:
          style: |
            .divider {
              display: flex;
              align-items: center;
            }
            .label::before {
              content: "{% set f = states('sensor.receta_en_el_obrador') | trim %}{% if f in ['---', ''] %}MÉTODO EMPÍRICO {% else %}{{ f | replace('_', ' ') | upper }} {% endif %}";
              color: var(--accent-color);
            }
            .label::after {
              content: "{{ states('number.masa_final_objetivo') | float(0) | round(0) }}g";
              font-size: 1.4rem !important;
              color: var(--secondary-text-color);
            }
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.harina_1
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_harina_1_neta
          name: >-
            {{ states('select.harina_principal_1') | upper }} ({{
            states('sensor.porcentaje_neto_harina_1') }}%)
          state: "{{ states('sensor.pan_harina_1_neta') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_harina_2_neta
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_harina_2_neta
          name: >-
            {{ states('select.harina_secundaria_2') | upper }} ({{
            states('sensor.porcentaje_neto_harina_2') }}%)
          state: "{{ states('sensor.pan_harina_2_neta') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_harina_3_neta
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_harina_3_neta
          name: >-
            {{ states('select.harina_secundaria_3') | upper }} ({{
            states('sensor.porcentaje_neto_harina_3') }}%)
          state: "{{ states('sensor.pan_harina_3_neta') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_agua_neta
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_agua_neta
          name: AGUA ({{ states('sensor.porcentaje_hidratacion_final') }}%)
          state: "{{ states('sensor.pan_agua_neta') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_sal_neta
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_sal_neta
          name: SAL ({{ states('number.sal') }}%)
          state: "{{ states('sensor.pan_sal_neta') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_levadura_neta
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_levadura_neta
          name: >-
            LEVADURA {{ states('button.alternar_fresca_seca') | upper }} ({{
            states('number.levadura') }}%)
          state: "{{ states('sensor.pan_levadura_neta') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          type: custom:template-entity-row
          entity: number.prefermento
          name: >-
            {{ states('select.tipo_de_prefermento') | upper }} ({{
            states('sensor.pan_prefermento_total') }}%)
          state: >-
            {{ state_attr('sensor.pan_prefermento_total',
            'gramos_totales_reales') }} g
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_malta
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_malta
          name: MALTA ({{ states('number.malta') }}%)
          state: "{{ states('sensor.pan_malta') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_azucar
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_azucar
          name: AZÚCAR ({{ states('number.azucar') }}%)
          state: "{{ states('sensor.pan_azucar') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_mantequilla
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_mantequilla
          name: MANTEQUILLA ({{ states('number.mantequilla') }}%)
          state: "{{ states('sensor.pan_mantequilla') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_aove
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_aove
          name: >-
            AOVE {% if is_state('select.formula_de_receta','pizza_detroit')
            %}(untar el molde){%endif%} ({{ states('number.aove') }}%)
          state: "{{ states('sensor.pan_aove') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_leche
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_leche
          name: LECHE ({{ states('number.leche_liquida') }}%)
          state: "{{ states('sensor.pan_leche') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_leche_polvo
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_leche_polvo
          name: LECHE EN POLVO 26%mg ({{ states('number.leche_en_polvo') }}%)
          state: "{{ states('sensor.pan_leche_polvo') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_huevo
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.pan_huevo
          name: HUEVO ({{ states('number.huevo') }}%)
          state: "{{ states('sensor.pan_huevo') }} g"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.tang_zhong_total
            above: 0
        row:
          type: custom:template-entity-row
          entity: sensor.tang_zhong_total
          name: TANG-ZHONG ({{ states('number.tang_zhong') }}%)
          state: "{{ states('sensor.tang_zhong_total') }} g"
          tap_action:
            action: none
    title: 📝Fórmula
  - title: 🌾 Harina de la Fórmula
    type: entities
    entities:
      - entity: select.harina_principal_1
        name: 🥇 Marca Harina 1
      - entity: select.harina_secundaria_2
        name: 🥈 Marca Harina 2
      - entity: select.harina_secundaria_3
        name: 🥉 Marca Harina 3
  - type: entities
    show_header_toggle: false
    entities:
      - type: call-service
        name: " "
        action_name: RESTABLECER
        service: button.press
        service_data:
          entity_id: button.restablecer_parametros_base
      - entity: select.formula_de_receta
      - entity: number.masa_final_objetivo
      - entity: number.harina_1
      - entity: number.harina_2
      - entity: number.harina_3
      - entity: number.agua_hidratacion
      - entity: number.sal
      - entity: number.levadura
      - type: conditional
        conditions:
          - entity: button.alternar_fresca_seca
            state: fresca
        row:
          entity: button.alternar_fresca_seca
          name: Levadura Fresca
          icon: mdi:yeast
      - type: conditional
        conditions:
          - entity: button.alternar_fresca_seca
            state: seca
        row:
          entity: button.alternar_fresca_seca
          name: Levadura Seca
          icon: mdi:yeast
      - entity: number.prefermento
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          entity: select.tipo_de_prefermento
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state_not: masa madre
        row:
          entity: number.levadura_prefermento
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: masa madre
        row:
          entity: number.inoculo_masa_madre
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: masa madre
        row:
          entity: number.hidratacion_masa_madre
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          entity: select.harina_para_prefermento
      - entity: switch.habilitar_ingredientes_extras
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.tang_zhong
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.tang_zhong
            above: 0
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
          - condition: numeric_state
            entity: number.leche_liquida
            above: 0
          - entity: button.alternar_tang_zhong_agua_leche
            state: agua
        row:
          entity: button.alternar_tang_zhong_agua_leche
          name: Tang-Zhong (Agua)
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.tang_zhong
            above: 0
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
          - condition: numeric_state
            entity: number.leche_liquida
            above: 0
          - entity: button.alternar_tang_zhong_agua_leche
            state: leche
        row:
          entity: button.alternar_tang_zhong_agua_leche
          name: Tang-Zhong (Leche)
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.malta
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.azucar
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.aove
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.mantequilla
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.leche_en_polvo
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.leche_liquida
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
        row:
          entity: number.huevo
      - type: conditional
        conditions:
          - condition: state
            entity: switch.habilitar_ingredientes_extras
            state: "on"
          - condition: or
            conditions:
              - condition: numeric_state
                above: 0
                entity: number.leche_liquida
              - condition: numeric_state
                above: 0
                entity: number.huevo
        row:
          entity: switch.calcular_hidratacion_real
    title: 🥖 Calculadora
  - type: entities
    title: 🌡️ Temperatura Agua Amasado
    show_header_toggle: false
    entities:
      - entity: number.temperatura_objetivo_masa
        name: Temp. Objetivo Masa
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state_not: "true"
        row:
          entity: number.temperatura_ambiente
          name: Temp. Ambiente
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
        row:
          entity: sensor.temperatura_real
          name: Temp. Ambiente
      - entity: number.temperatura_harina
        name: Temp. Harina
      - type: conditional
        conditions:
          - condition: numeric_state
            above: 0
            entity: number.prefermento
        row:
          entity: number.temperatura_prefermento
          name: Temp. Prefermento
      - entity: number.temperatura_friccion_amasadora
        name: Temp. Amasadora
      - entity: sensor.pan_temperatura_agua_ideal
        name: Temperatura del Agua
        tap_action:
          action: none
        card_mod:
          style:
            .: |
              :host {
                --card-mod-icon-color: #2196f3;
              }
            hui-generic-entity-row $: |
              .state {
                font-size: 1.4rem !important;
                font-weight: bold !important;
              }
  - type: entities
    title: 📈 Control Tiempo De Levado
    show_header_toggle: false
    entities:
      - entity: sensor.tiempo_de_levado_estimado
      - entity: sensor.hora_de_masa_lista_aproximada
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state_not: "true"
        row:
          entity: number.temperatura_ambiente
          name: Ajuste manual
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
        row:
          entity: select.origen_temperatura_levado
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
          - condition: state
            entity: select.origen_temperatura_levado
            state: Sensor Físico
        row:
          entity: sensor.temperatura_real
          name: Temperatura Ambiente
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
          - condition: state
            entity: select.origen_temperatura_levado
            state: Manual (Slider)
        row:
          entity: number.temperatura_ambiente
          name: Ajuste Manual
  - type: entities
    title: 📋Info Totales
    show_header_toggle: false
    entities:
      - type: custom:template-entity-row
        entity: sensor.pan_harina_total
        name: • TOTAL HARINA ({{ states('sensor.porcentaje_harina_total') }}%)
        state: "{{ states('sensor.pan_harina_total') }} g"
        tap_action:
          action: none
      - type: custom:template-entity-row
        entity: sensor.pan_agua_total
        name: • TOTAL AGUA ({{ states('number.agua_hidratacion') }}%)
        state: "{{ states('sensor.pan_agua_total') }} g"
        tap_action:
          action: none
      - type: custom:template-entity-row
        entity: sensor.pan_prefermento_total
        name: >-
          • TOTAL {{ states('select.tipo_de_prefermento') | upper }} ({{
          states('sensor.pan_prefermento_total') }}%)
        state: >-
          {{ state_attr('sensor.pan_prefermento_total', 'gramos_totales_reales')
          }} g
        tap_action:
          action: none
      - type: custom:template-entity-row
        entity: sensor.tang_zhong_total
        name: • TOTAL TANG-ZHON ({{ states('number.tang_zhong') }}%)
        state: "{{ states('sensor.tang_zhong_total') }} g"
        tap_action:
          action: none
  - type: entities
    title: 💾 Gestión De Fórmulas
    show_header_toggle: false
    entities:
      - type: section
        label: AÑADIR FÓRMULA NUEVA
      - entity: text.nombre_nueva_formula
        name: "NOMBRE PARA GUARDAR FÓRMULA:"
      - type: call-service
        name: " "
        action_name: 💾 GUARDAR
        service: porcentaje_panadero.guardar_formula
      - type: section
        label: GESTIÓN DE FÓRMULA SELECCIONADA ACTUALMENTE
      - type: call-service
        name: ACTUALIZAR
        icon: mdi:content-save-plus
        action_name: 💾 GUARDAR
        service: porcentaje_panadero.confirmar_sobreescritura
      - type: call-service
        name: ELIMINAR
        icon: mdi:delete
        action_name: ❌ ELIMINAR
        service: porcentaje_panadero.confirmar_eliminacion
      - type: section
        label: REGISTRAR HARINA EN LA BASE DE DATOS
      - entity: text.nombre_nueva_harina
        name: AÑADIR MARCA / TIPO DE HARINA
      - type: call-service
        name: " "
        action_name: 💾 GUARDAR
        service: porcentaje_panadero.anadir_harina
      - type: section
        label: ELIMINAR HARINA DE LA BASE DE DATOS
      - entity: select.porcentaje_panadero_pan_select_retirar_harina_del_inventario
        name: SELECCIONA HARINA A ELIMINAR
      - type: call-service
        name: " "
        action_name: ❌ ELIMINAR
        service: porcentaje_panadero.eliminar_harina
