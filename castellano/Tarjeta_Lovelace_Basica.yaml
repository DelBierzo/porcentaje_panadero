type: vertical-stack
cards:
  - type: vertical-stack
    cards:
      - type: entities
        show_header_toggle: false
        entities:
          - entity: button.restablecer_parametros_base
          - entity: select.formula_de_receta
          - entity: number.masa_final_objetivo
          - entity: number.harina_1
          - entity: number.harina_2
          - entity: number.harina_3
          - entity: number.agua_hidratacion
          - entity: number.sal
          - entity: number.levadura
          - type: conditional
            conditions:
              - entity: button.alternar_fresca_seca
                state: fresca
            row:
              entity: button.alternar_fresca_seca
              name: Levadura Fresca
              icon: mdi:yeast
          - type: conditional
            conditions:
              - entity: button.alternar_fresca_seca
                state: seca
            row:
              entity: button.alternar_fresca_seca
              name: Levadura Seca
              icon: mdi:yeast
          - entity: number.prefermento
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
            row:
              entity: select.tipo_de_prefermento
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state_not: masa madre
            row:
              entity: number.levadura_prefermento
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: masa madre
            row:
              entity: number.inoculo_masa_madre
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: masa madre
            row:
              entity: number.hidratacion_masa_madre
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
            row:
              entity: select.harina_para_prefermento
          - entity: switch.habilitar_ingredientes_extras
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.tang_zhong
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.tang_zhong
                above: 0
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
              - condition: numeric_state
                entity: number.leche_liquida
                above: 0
              - entity: button.alternar_tang_zhong_agua_leche
                state: agua
            row:
              entity: button.alternar_tang_zhong_agua_leche
              name: Tang-Zhong (Agua)
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.tang_zhong
                above: 0
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
              - condition: numeric_state
                entity: number.leche_liquida
                above: 0
              - entity: button.alternar_tang_zhong_agua_leche
                state: leche
            row:
              entity: button.alternar_tang_zhong_agua_leche
              name: Tang-Zhong (Leche)
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.malta
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.azucar
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.aove
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.mantequilla
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.leche_en_polvo
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.leche_liquida
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.huevo
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
              - condition: or
                conditions:
                  - condition: numeric_state
                    above: 0
                    entity: number.leche_liquida
                  - condition: numeric_state
                    above: 0
                    entity: number.huevo
            row:
              entity: switch.calcular_hidratacion_real
        title: 🥖 El Rincon Del Panadero
  - type: markdown
    visibility:
      - condition: numeric_state
        above: 0
        entity: number.tang_zhong
    content: >
      {% set sensor = 'sensor.tang_zhong_total' %} {% set sensor_masa =
      'number.masa_final_objetivo' %} {% set sensor_pct = 'number.tang_zhong' %}
      {% set total = states(sensor) | float(0) %} {% set masa_obj =
      states(sensor_masa) | float(1000) | round(0) %} {% set pct_tz =
      states(sensor_pct) | float(0) | round(0) %} {% set harina =
      state_attr(sensor, 'harina_g') | float(0) %} {% set liquido =
      state_attr(sensor, 'liquido_total_g') | float(0) %} {% set leche =
      state_attr(sensor, 'leche_utilizada_g') | float(0) %} {% set agua_asis =
      state_attr(sensor, 'agua_asistencia_g') | float(0) | round(1) %} {% set
      base = state_attr(sensor, 'base_solicitada') | default('agua', true) %}

      {% if total > 0 %}
        ### <font color= '#ff9800'>**Tang-Zhong:**</font>  *{{ total }} g* ( {{ pct_tz }}% )
        
        * **HARINA A ESCALDAR: {{ harina }} g** *(HARINA 1)*
        * **LIQUIDO REQUERIDO (1:5): {{ liquido }} g** *(BASE: {{ base | upper }})*
        
        {% if base == 'leche' and leche > 0 and agua_asis > 0 %}
        ---
        
        * **LECHE: {{ leche }} g**
        * **AGUA: {{ agua_asis }} g**

      <font color='#ff9800'>?? **!AVISO DE ESCALDADO MIXTO!**

      La formula no tiene suficiente leche, hay que anadir agua.</font>
        {% endif %}
        
        {# Si la leche llega no se muestra ninguna linea de liquido #}
      {% endif %}
  - type: entities
    entities:
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: masa madre
        row:
          type: section
          label: " "
          card_mod:
            style: >
              .divider { display: flex; align-items: center; }

              .label::before { content: "REFRESCO MASA MADRE"; font-weight:
              bold; color: var(--accent-color); }
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: biga
        row:
          type: section
          label: " "
          card_mod:
            style: >
              .divider { display: flex; align-items: center; }

              .label::before { content: "ELABORACION BIGA"; font-weight: bold;
              color: var(--accent-color); }
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: poolish
        row:
          type: section
          label: " "
          card_mod:
            style: >
              .divider { display: flex; align-items: center; }

              .label::before { content: "ELABORACION POOLISH"; font-weight:
              bold; color: var(--accent-color); }
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          type: custom:template-entity-row
          entity: select.harina_para_prefermento
          name: Harina asignada al prefermento
          state: "{{ states('select.harina_para_prefermento') | upper }}"
          icon: mdi:barley
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: masa madre
        row:
          entity: sensor.pan_inoculo_masa_madre
          name: Inoculo masa madre
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state_not
            entity: select.tipo_de_prefermento
            state_not: masa madre
        row:
          entity: sensor.pan_levadura_prefermento
          name: Levadura prefermento
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          entity: sensor.pan_harina_prefermento
          name: Harina
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          entity: sensor.pan_agua_prefermento
          name: Agua
          tap_action:
            action: none
      - type: section
        label: " "
        card_mod:
          style: |
            .divider {
              display: flex;
              align-items: center;
            }
            .label::before {
              content: "{% set f = states('sensor.receta_en_el_obrador') | trim %}{% if f in ['---', ''] %}METODO EMPIRICO {% else %}{{ f | replace('_', ' ') | upper }} {% endif %}";
              font-weight: bold;
              color: var(--accent-color);
            }
            .label::after {
              content: "{{ states('number.masa_final_objetivo') | float(0) | round(0) }}g";
              font-weight: bold;
              font-size: 1.4rem !important;
              color: var(--secondary-text-color);
            }
      - entity: sensor.pan_harina_1_neta
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_harina_2_neta
            above: 0
        row:
          entity: sensor.pan_harina_2_neta
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_harina_3_neta
            above: 0
        row:
          entity: sensor.pan_harina_3_neta
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_agua_neta
            above: 0
        row:
          entity: sensor.pan_agua_neta
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_sal_neta
            above: 0
        row:
          entity: sensor.pan_sal_neta
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_levadura_neta
            above: 0
        row:
          entity: sensor.pan_levadura_neta
      - type: conditional
        conditions:
          - entity: button.alternar_fresca_seca
            state_not: unknown
        row:
          type: attribute
          entity: button.alternar_fresca_seca
          attribute: tipo_levadura
          name: Tipo Levadura
          icon: mdi:information-outline
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_malta
            above: 0
        row:
          entity: sensor.pan_malta
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_azucar
            above: 0
        row:
          entity: sensor.pan_azucar
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_aove
            above: 0
        row:
          entity: sensor.pan_aove
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_mantequilla
            above: 0
        row:
          entity: sensor.pan_mantequilla
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_leche_polvo
            above: 0
        row:
          entity: sensor.pan_leche_polvo
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_leche
            above: 0
        row:
          entity: sensor.pan_leche
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_huevo
            above: 0
        row:
          entity: sensor.pan_huevo
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.tang_zhong_total
            above: 0
        row:
          entity: sensor.tang_zhong_total
    title: 📝Formula
  - type: entities
    title: 🌡️ Temperatura Agua Amasado
    show_header_toggle: false
    entities:
      - entity: number.temperatura_objetivo_masa
        name: Temp. Objetivo Masa
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state_not: "true"
        row:
          entity: number.temperatura_ambiente
          name: Temp. Ambiente
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
        row:
          entity: sensor.temperatura_real
          name: Temp. Ambiente
      - entity: number.temperatura_harina
        name: Temp. Harina
      - type: conditional
        conditions:
          - condition: numeric_state
            above: 0
            entity: number.prefermento
        row:
          entity: number.temperatura_prefermento
          name: Temp. Prefermento
      - entity: number.temperatura_friccion_amasadora
        name: Temp. Amasadora
      - entity: sensor.pan_temperatura_agua_ideal
        name: Temperatura del Agua
        tap_action:
          action: none
        card_mod:
          style:
            .: |
              :host {
                --card-mod-icon-color: #2196f3;
              }
            hui-generic-entity-row $: |
              .state {
                font-size: 1.4rem !important;
                font-weight: bold !important;
              }
  - type: entities
    title: 📈 Control Tiempo De Levado
    show_header_toggle: false
    entities:
      - entity: sensor.tiempo_de_levado_estimado
      - entity: sensor.hora_de_masa_lista_aproximada
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state_not: "true"
        row:
          entity: number.temperatura_ambiente
          name: Ajuste manual
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
        row:
          entity: select.origen_temperatura_levado
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
          - condition: state
            entity: select.origen_temperatura_levado
            state: Sensor Físico
        row:
          entity: sensor.temperatura_real
          name: Temperatura Ambiente
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
          - condition: state
            entity: select.origen_temperatura_levado
            state: Manual (Slider)
        row:
          entity: number.temperatura_ambiente
          name: Ajuste Manual
  - type: entities
    title: 📋Info
    show_header_toggle: false
    entities:
      - entity: sensor.pan_harina_total
      - entity: sensor.porcentaje_harina_total
  - type: entities
    title: 💾 Gestion De Formulas
    show_header_toggle: false
    entities:
      - entity: text.nombre_nueva_formula
        name: "Nombre para guardar:"
      - entity: button.guardar_receta_nueva
        name: Guardar / Actualizar Formula
      - entity: button.eliminar_receta_activa
        name: Eliminar Formula Activa
