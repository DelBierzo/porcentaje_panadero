automation:
  # AUTOMATION 1: Request interactive confirmation for file overwrite
  - id: porcentaje_panadero_confirmacion_interactiva
    alias: "Baker's Percentage: Request Overwrite Confirmation"
    mode: single
    trigger:
      - platform: event
        event_type: porcentaje_panadero_alerta_duplicado
    action:
      - variables:
          nombre_receta: "{{ trigger.event.data.nombre }}"
      - action: notify.notify # Or target your specific device: "notify.mobile_app_your_phone"
        data:
          title: "Modify Formula?"
          message: "The formula '**{{ nombre_receta }}**' already exists. Are you sure you want to overwrite it?"
          data:
            actions:
              - action: "CONFIRMAR_PAN"
                title: "Yes, modify recipe"
              - action: "CANCELAR_PAN"
                title: "No, keep old one"
      - wait_for_trigger:
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: "CONFIRMAR_PAN"
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: "CANCELAR_PAN"
        timeout: "00:05:00"
      - if:
          - condition: template
            value_template: "{{ wait.trigger is none }}"
        then:
          - action: notify.notify
            data:
              message: "clear_notification"
              data:
                tag: "porcentaje_panadero_alerta_duplicado"


  # AUTOMATION 2: Execute silent overwrite if 'YES' is pressed
  - id: porcentaje_panadero_accion_confirmada_movil
    alias: "Baker's Percentage: Process Affirmative Response from Phone"
    mode: single
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "CONFIRMAR_PAN"
    action:
      - action: porcentaje_panadero.confirmar_sobreescritura


  # AUTOMATION 3: Launch notification to confirm recipe deletion
  - id: porcentaje_panadero_alerta_borrado_movil
    alias: "Baker's Percentage: Phone Alert for Deletion Confirmation"
    description: "Triggers a notification to confirm before permanently destroying a recipe"
    trigger:
      - platform: event
        event_type: porcentaje_panadero_alerta_eliminar
    action:
      - action: notify.notify  # Or target your specific device: "notify.mobile_app_your_phone"
        data:
          title: "Delete Active Formula?"
          message: "You are about to permanently delete the formula: **{{ trigger.event.data.nombre }}**. Do you wish to proceed?"
          data:
            actions:
              - action: "PAN_CONFIRMAR_BORRADO"
                title: "Yes, Delete"
              - action: "PAN_CANCELAR_BORRADO"
                title: "Cancel"


  # AUTOMATION 4: Process physical tap on phone and erase from JSON
  - id: porcentaje_panadero_borrado_confirmado_movil
    alias: "Baker's Percentage: Process Deletion Response"
    description: "Listens for the phone action tap and calls the forced Python service"
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "PAN_CONFIRMAR_BORRADO"
    action:
      - action: porcentaje_panadero.confirmar_eliminacion
