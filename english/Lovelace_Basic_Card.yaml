type: vertical-stack
cards:
  - type: vertical-stack
    cards:
      - type: entities
        show_header_toggle: false
        entities:
          - entity: button.restablecer_parametros_base
          - entity: select.formula_de_receta
          - entity: number.masa_final_objetivo
          - entity: number.harina_1
          - entity: number.harina_2
          - entity: number.harina_3
          - entity: number.agua_hidratacion
          - entity: number.sal
          - entity: number.levadura
          - type: conditional
            conditions:
              - entity: button.alternar_fresca_seca
                state: fresca
            row:
              entity: button.alternar_fresca_seca
              name: Fresh Yeast
              icon: mdi:yeast
          - type: conditional
            conditions:
              - entity: button.alternar_fresca_seca
                state: seca
            row:
              entity: button.alternar_fresca_seca
              name: Instant Dry Yeast
              icon: mdi:yeast
          - entity: number.prefermento
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
            row:
              entity: select.tipo_de_prefermento
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state_not: masa madre
            row:
              entity: number.levadura_prefermento
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: masa madre
            row:
              entity: number.inoculo_masa_madre
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: masa madre
            row:
              entity: number.hidratacion_masa_madre
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
            row:
              entity: select.harina_para_prefermento
          - entity: switch.habilitar_ingredientes_extras
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.tang_zhong
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.tang_zhong
                above: 0
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
              - condition: numeric_state
                entity: number.leche_liquida
                above: 0
              - entity: button.alternar_tang_zhong_agua_leche
                state: agua
            row:
              entity: button.alternar_tang_zhong_agua_leche
              name: Tang-Zhong (Water)
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.tang_zhong
                above: 0
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
              - condition: numeric_state
                entity: number.leche_liquida
                above: 0
              - entity: button.alternar_tang_zhong_agua_leche
                state: leche
            row:
              entity: button.alternar_tang_zhong_agua_leche
              name: Tang-Zhong (Milk)
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.malta
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.azucar
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.aove
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.mantequilla
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.leche_en_polvo
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.leche_liquida
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
            row:
              entity: number.huevo
          - type: conditional
            conditions:
              - condition: state
                entity: switch.habilitar_ingredientes_extras
                state: "on"
              - condition: or
                conditions:
                  - condition: numeric_state
                    above: 0
                    entity: number.leche_liquida
                  - condition: numeric_state
                    above: 0
                    entity: number.huevo
            row:
              entity: switch.calcular_hidratacion_real
        title: 🥖 The Baker's Corner
  - type: markdown
    visibility:
      - condition: numeric_state
        above: 0
        entity: number.tang_zhong
    content: >
      {% set sensor = 'sensor.tang_zhong_total' %} {% set sensor_masa =
      'number.masa_final_objetivo' %} {% set sensor_pct = 'number.tang_zhong' %}
      {% set total = states(sensor) | float(0) %} {% set masa_obj =
      states(sensor_masa)

      | float(1000) | round(0) %} {% set pct_tz = states(sensor_pct) | float(0)
      | round(0) %} {% set harina = state_attr(sensor, 'harina_g') | float(0) %}
      {% set liquido = state_attr(sensor, 'liquido_total_g') | float(0) %} {%
      set leche = state_attr(sensor, 'leche_utilizada_g') | float(0) %} {% set
      agua_asis = state_attr(sensor, 'agua_asistencia_g') | float(0) | round(1)
      %} {% set base = state_attr(sensor, 'base_solicitada') | default('agua',
      true) %}

      {% if total > 0 %}
        ### <font color= '#ff9800'>**Tang-Zhong:**</font>  *{{ total }} g* ( {{ pct_tz }}% )
        
        * **FLOUR TO SCALD: {{ harina }} g** *(FLOUR 1)*
        * **REQUIRED LIQUID (1:5): {{ liquido }} g** *(BASE: {{ base | upper }})*
        
        {% if base == 'leche' and leche > 0 and agua_asis > 0 %}
        ---
        
        * **MILK: {{ leche }} g**
        * **WATER: {{ agua_asis }} g**

      <font color='#ff9800'>⚠️ **MIXED SCALDING ALERT!**

      The formula lacks sufficient milk, water must be added.</font>
        {% endif %}
        
        {# If milk is sufficient, no liquid line is displayed #}
      {% endif %}
  - type: entities
    entities:
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: masa madre
        row:
          type: section
          label: " "
          card_mod:
            style: >
              .divider { display: flex; align-items: center; }

              .label::before { content: "SOURDOUGH REFRESHMENT"; font-weight:
              bold; color: var(--accent-color); }
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: biga
        row:
          type: section
          label: " "
          card_mod:
            style: >
              .divider { display: flex; align-items: center; }

              .label::before { content: "BIGA PREPARATION"; font-weight: bold;
              color: var(--accent-color); }
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: poolish
        row:
          type: section
          label: " "
          card_mod:
            style: >
              .divider { display: flex; align-items: center; }

              .label::before { content: "POOLISH PREPARATION"; font-weight:
              bold; color: var(--accent-color); }
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          type: custom:template-entity-row
          entity: select.harina_para_prefermento
          name: Flour assigned to preferment
          state: "{{ states('select.harina_para_prefermento') | upper }}"
          icon: mdi:barley
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state
            entity: select.tipo_de_prefermento
            state: masa madre
        row:
          entity: sensor.pan_inoculo_masa_madre
          name: Sourdough inoculum
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
          - condition: state_not
            entity: select.tipo_de_prefermento
            state_not: masa madre
        row:
          entity: sensor.pan_levadura_prefermento
          name: Preferment yeast
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          entity: sensor.pan_harina_prefermento
          name: Flour
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: number.prefermento
            above: 0
        row:
          entity: sensor.pan_agua_prefermento
          name: Water
          tap_action:
            action: none
      - type: section
        label: " "
        card_mod:
          style: |
            .divider {
              display: flex;
              align-items: center;
            }
            .label::before {
              content: "{% set f = states('sensor.receta_en_el_obrador') | trim %}{% if f in ['---', ''] %}EMPIRICAL METHOD {% else %}{{ f | replace('_', ' ') | upper }} {% endif %}";
              font-weight: bold;
              color: var(--accent-color);
            }
            .label::after {
              content: "{{ states('number.masa_final_objetivo') | float(0) | round(0) }}g";
              font-weight: bold;
              font-size: 1.4rem !important;
              color: var(--secondary-text-color);
            }
      - entity: sensor.pan_harina_1_neta
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_harina_2_neta
            above: 0
        row:
          entity: sensor.pan_harina_2_neta
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_harina_3_neta
            above: 0
        row:
          entity: sensor.pan_harina_3_neta
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_agua_neta
            above: 0
        row:
          entity: sensor.pan_agua_neta
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_sal_neta
            above: 0
        row:
          entity: sensor.pan_sal_neta
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_levadura_neta
            above: 0
        row:
          entity: sensor.pan_levadura_neta
      - type: conditional
        conditions:
          - entity: button.alternar_fresca_seca
            state_not: unknown
        row:
          type: attribute
          entity: button.alternar_fresca_seca
          attribute: tipo_levadura
          name: Yeast Type
          icon: mdi:information-outline
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_malta
            above: 0
        row:
          entity: sensor.pan_malta
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_azucar
            above: 0
        row:
          entity: sensor.pan_azucar
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_aove
            above: 0
        row:
          entity: sensor.pan_aove
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_mantequilla
            above: 0
        row:
          entity: sensor.pan_mantequilla
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_leche_polvo
            above: 0
        row:
          entity: sensor.pan_leche_polvo
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_leche
            above: 0
        row:
          entity: sensor.pan_leche
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.pan_huevo
            above: 0
        row:
          entity: sensor.pan_huevo
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.tang_zhong_total
            above: 0
        row:
          entity: sensor.tang_zhong_total
    title: 📝Formula
  - type: entities
    title: 🌡️ Dough Water Temperature
    show_header_toggle: false
    entities:
      - entity: number.temperatura_objetivo_masa
        name: Target Dough Temp
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state_not: "true"
        row:
          entity: number.temperatura_ambiente
          name: Room Temp
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
        row:
          entity: sensor.temperatura_real
          name: Room Temp
      - entity: number.temperatura_harina
        name: Flour Temp
      - entity: number.temperatura_prefermento
        name: Preferment Temp
      - entity: number.temperatura_friccion_amasadora
        name: Mixer Friction Temp
      - entity: sensor.pan_temperatura_agua_ideal
        name: Ideal Water Temp >>>
  - type: entities
    title: 📈 Proofing & Fermentation
    show_header_toggle: false
    entities:
      - entity: sensor.tiempo_de_levado_estimado
        name: Estimated Proofing Time
      - entity: sensor.hora_de_masa_lista_aproximada
        name: Approximate Ready Time
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state_not: "true"
        row:
          entity: number.temperatura_ambiente
          name: Manual adjustment
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
        row:
          entity: select.origen_temperatura_levado
          name: Choose Temp Source
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
          - condition: state
            entity: select.origen_temperatura_levado
            state: Sensor Físico
        row:
          entity: sensor.temperatura_real
          name: Environment Temperature
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.sensor_fisico_instalado
            state: "true"
          - condition: state
            entity: select.origen_temperatura_levado
            state: Manual (Slider)
        row:
          entity: number.temperatura_ambiente
          name: Manual Adjustment
  - type: entities
    title: 📋 Info
    show_header_toggle: false
    entities:
      - entity: sensor.pan_harina_total
      - entity: sensor.porcentaje_harina_total
  - type: entities
    title: 💾 Recipe Management
    show_header_toggle: false
    entities:
      - entity: text.nombre_nueva_formula
        name: "Name to save:"
      - entity: button.guardar_receta_nueva
        name: Save / Update Formula
      - entity: button.eliminar_receta_activa
        name: Delete Active Formula
