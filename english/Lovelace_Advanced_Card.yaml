                  - condition: numeric_state
                    above: 0
                    entity: number.tang_zhong
                content: >
                  {% set sensor = 'sensor.tang_zhong_total' %} {% set
                  sensor_masa = 'number.masa_final_objetivo' %} {% set
                  sensor_pct = 'number.tang_zhong' %} {% set total =
                  states(sensor) | float(0) %} {% set masa_obj =
                  states(sensor_masa) | float(1000) | round(0) %} {% set pct_tz
                  = states(sensor_pct) | float(0) | round(0) %} {% set harina =
                  state_attr(sensor, 'harina_g') | float(0) %} {% set liquido =
                  state_attr(sensor, 'liquido_total_g') | float(0) %} {% set
                  leche = state_attr(sensor, 'leche_utilizada_g') | float(0) %}
                  {% set agua_asis = state_attr(sensor, 'agua_asistencia_g') |
                  float(0) | round(1) %} {% set base = state_attr(sensor,
                  'base_solicitada') | default('agua', true) %}

