type: vertical-stack
cards:
  - type: heading
    heading_style: title
    badges:
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.receta_en_el_obrador
        tap_action:
          action: none
        color: primary
  - type: custom:expander-card
    cards:
      - type: markdown
        visibility:
          - condition: numeric_state
            above: 0
            entity: number.tang_zhong
        content: >
          {% set sensor = 'sensor.tang_zhong_total' %} {% set sensor_masa =
          'number.masa_final_objetivo' %} {% set sensor_pct =
          'number.tang_zhong' %} {% set total = states(sensor) | float(0) %} {%
          set masa_obj = states(sensor_masa)

          | float(1000) | round(0) %} {% set pct_tz = states(sensor_pct) |
          float(0) | round(0) %} {% set harina = state_attr(sensor, 'harina_g')
          | float(0) %} {% set liquido = state_attr(sensor, 'liquido_total_g') |
          float(0) %} {% set leche = state_attr(sensor, 'leche_utilizada_g') |
          float(0) %} {% set agua_asis = state_attr(sensor, 'agua_asistencia_g')
          | float(0) | round(1) %} {% set base = state_attr(sensor,
          'base_solicitada') | default('agua', true) %}

          {% if total > 0 %}
            ### <font color= '#ff9800'>**Tang-Zhong:**</font>  *{{ total }} g* ( {{ pct_tz }}% )
            
            * **FLOUR TO SCALD: {{ harina }} g**
              *({{ state_attr('sensor.pan_harina_prefermento', 'nombre_harina_real') | upper }})*
            
            * **REQUIRED LIQUID (1:5): {{ liquido }} g**
              *(BASE: {{ base | upper }})*
            
            {% if base == 'leche' and leche > 0 and agua_asis > 0 %}
            ---
            
            * **MILK: {{ leche }} g**
            * **WATER: {{ agua_asis }} g**

          <font color='#ff9800'>⚠️ **¡MIXED SCALDING NOTICE!**

          The formula does not have enough milk, water must be added.</font>
            {% endif %}
            
            {# Si la leche llega no se muestra ninguna línea de líquido #}
          {% endif %}
      - type: entities
        show_header_toggle: false
        entities:
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: masa madre
            row:
              type: section
              label: " "
              card_mod:
                style: |
                  .divider {
                    display: flex;
                    align-items: center;
                  }
                  .label::before {
                    content: "SOURDOUGH REFRESHMENT";
                    font-weight: bold;
                    color: var(--accent-color);
                  }
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: biga
            row:
              type: section
              label: " "
              card_mod:
                style: |
                  .divider {
                    display: flex;
                    align-items: center;
                  }
                  .label::before {
                    content: "BIGA PREPARATION";
                    font-weight: bold;
                    color: var(--accent-color);
                  }
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: poolish
            row:
              type: section
              label: " "
              card_mod:
                style: |
                  .divider {
                    display: flex;
                    align-items: center;
                  }
                  .label::before {
                    content: "POOLISH PREPARATION";
                    font-weight: bold;
                    color: var(--accent-color);
                  }
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: masa madre
            row:
              type: custom:template-entity-row
              entity: sensor.pan_inoculo_masa_madre
              name: >-
                SOURDOUGH INOCULUM ({{
                states('sensor.porcentaje_inoculo_receta') }}%)
              state: "{{ states('sensor.pan_inoculo_masa_madre') }} g"
              tap_action:
                action: none
              card_mod:
                style: |
                  div.state {
                    font-size: 1.2rem !important;
                  }
                  .info {
                    font-size: 14px !important;
                    font-weight: bold !important;
