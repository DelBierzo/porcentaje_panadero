# porcentaje_panadero_ES

automation:
  # AUTOMATIZACION 1: Solicitar confirmacion interactiva de sobreescritura de archivos
  - id: porcentaje_panadero_confirmacion_interactiva
    alias: "porcentaje panadero: solicitar confirmacion de sobreescritura"
    mode: single
    trigger:
      - platform: event
        event_type: porcentaje_panadero_alerta_duplicado
    action:
      - variables:
          nombre_receta: "{{ trigger.event.data.nombre }}"
      - action: notify.notify
        data:
          title: "¿Modificar Formula?"
          message: "La formula '**{{ nombre_receta }}**' ya existe. ¿Estas seguro de que quieres sobrescribirla?"
          data:
            actions:
              - action: "CONFIRMAR_PAN"
                title: "Si, modificar receta"
              - action: "CANCELAR_PAN"
                title: "No, mantener antigua"
      - wait_for_trigger:
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: "CONFIRMAR_PAN"
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: "CANCELAR_PAN"
        timeout: "00:05:00"
      - if:
          - condition: template
            value_template: "{{ wait.trigger is none }}"
        then:
          - action: notify.notify
            data:
              message: "clear_notification"
              data:
                tag: "porcentaje_panadero_alerta_duplicado"


  # AUTOMATIZACION 2: Ejecutar la sobreescritura silenciosa si pulsas 'SI'
  - id: porcentaje_panadero_accion_confirmada_movil
    alias: "porcentaje panadero: procesar respuesta afirmativa del movil"
    mode: single
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "CONFIRMAR_PAN"
    action:
      - action: porcentaje_panadero.confirmar_sobreescritura


  # AUTOMATIZACION 3: Lanza notificacion de confirmacion de borrado de formula
  - id: porcentaje_panadero_alerta_borrado_movil
    alias: "porcentaje panadero: alerta movil de confirmacion de borrado"
    description: "Lanza una notificacion para confirmar antes de destruir una formula"
    trigger:
      - platform: event
        event_type: porcentaje_panadero_alerta_eliminar
    action:
      - action: notify.notify  # Corregido a la directiva oficial action
        data:
          title: "¿Eliminar Formula Activa?"
          message: "Estas a punto de borrar definitivamente la formula: **{{ trigger.event.data.nombre }}**. ¿Deseas proceder?"
          data:
            actions:
              - action: "PAN_CONFIRMAR_BORRADO"
                title: "Si, Eliminar"
              - action: "PAN_CANCELAR_BORRADO"
                title: "Cancelar"


  # AUTOMATIZACION 4: Procesa tu pulsacion fisica en el telefono y tritura el JSON
  - id: porcentaje_panadero_borrado_confirmado_movil
    alias: "porcentaje panadero: procesar respuesta de borrado"
    description: "Escucha el clic del telefono y llama al servicio forzado de Python"
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "PAN_CONFIRMAR_BORRADO"
    action:
      - action: porcentaje_panadero.confirmar_eliminacion  # Corregido a la directiva oficial action
