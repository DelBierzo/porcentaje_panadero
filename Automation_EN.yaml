# porcentaje_panadero_EN

automation:
  # AUTOMATION 1: Request interactive mobile confirmation before overwriting recipes
  - id: porcentaje_panadero_confirmacion_interactiva_en
    alias: "bakers percentage: request overwrite confirmation"
    mode: single
    trigger:
      - platform: event
        event_type: porcentaje_panadero_alerta_duplicado
    action:
      - variables:
          recipe_name: "{{ trigger.event.data.nombre }}"
      - action: notify.notify # only your phone "notify.mobile_app_phone"
        data:
          title: "Overwrite Formula?"
          message: "The dough recipe '**{{ recipe_name }}**' already exists. Are you sure you want to overwrite it?"
          data:
            actions:
              - action: "CONFIRMAR_PAN"
                title: "Yes, overwrite recipe"
              - action: "CANCELAR_PAN"
                title: "No, keep old one"
      - wait_for_trigger:
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: "CONFIRMAR_PAN"
          - platform: event
            event_type: mobile_app_notification_action
            event_data:
              action: "CANCELAR_PAN"
        timeout: "00:05:00"
      - if:
          - condition: template
            value_template: "{{ wait.trigger is none }}"
        then:
          - action: notify.notify
            data:
              message: "clear_notification"
              data:
                tag: "porcentaje_panadero_alerta_duplicado"


  # AUTOMATION 2: Execute silent overwrite in Python when 'YES' is pressed on mobile
  - id: porcentaje_panadero_accion_confirmada_movil_en
    alias: "bakers percentage: process mobile overwrite response"
    mode: single
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "CONFIRMAR_PAN"
    action:
      - action: porcentaje_panadero.confirmar_sobreescritura


  # AUTOMATION 3: Send interactive mobile notification before deleting active recipes
  - id: porcentaje_panadero_alerta_borrado_movil_en
    alias: "bakers percentage: request delete confirmation"
    description: "Triggers a notification to confirm before destroying a recipe"
    trigger:
      - platform: event
        event_type: porcentaje_panadero_alerta_eliminar
    action:
      - action: notify.notify # only your phone "notify.mobile_app_phone"
        data:
          title: "Delete Active Formula?"
          message: "You are about to permanently delete the formula: **{{ trigger.event.data.nombre }}**. Do you want to proceed?"
          data:
            actions:
              - action: "PAN_CONFIRMAR_BORRADO"
                title: "Yes, Delete"
              - action: "PAN_CANCELAR_BORRADO"
                title: "Cancel"


  # AUTOMATION 4: Process phone press response and trigger core Python file deletion
  - id: porcentaje_panadero_borrado_confirmado_movil_en
    alias: "bakers percentage: process mobile delete response"
    description: "Listens for the mobile tap and triggers the forced python service"
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "PAN_CONFIRMAR_BORRADO"
    action:
      - action: porcentaje_panadero.confirmar_eliminacion
