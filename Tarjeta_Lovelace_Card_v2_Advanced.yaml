    clear: false
    clear-children: true
    title-card-clickable: false
    title-card-button-overlay: false
    child-margin-top: 0em
    title: CALCULADORA PORCENTAJE PANADERO
    title-card:
      type: custom:custom-features-card
      features:
        - type: custom:service-call
          entries:
            - type: slider
              entity_id: number.masa_final_objetivo
              icon: mdi:scale
              unit_of_measurement: g
              tap_action:
                action: perform-action
                perform_action: number.set_value
                data:
                  value: "{{ value | float }}"
                target:
                  entity_id: number.masa_final_objetivo
              range:
                - 100
                - 10000
              step: 50
              styles: |-
                :host {
                  flex-basis: 100%;
                  --color: var(--green-color);
                }
                .icon {
                  display: none;
                }
                .background {
                  background: var(--green-color);
                  --color: var(--green-color);
                }
              thumb: default
            - type: spinbox
              entity_id: number.masa_final_objetivo
              icon: mdi:scale
              unit_of_measurement: g
              tap_action:
                action: perform-action
                perform_action: number.set_value
                data:
                  value: "{{ value | float }}"
                target:
                  entity_id: number.masa_final_objetivo
              range:
                - 100
                - 10000
              step: 10
              styles: |
                :host {
                  flex-flow: row;
                }
                .icon {
                  display: none;
                }
                .label {
                  font-size: 1.4rem !important;
                }    
              debounce_time: 100
              label: "{{ value | float }} g"
          styles: ""
      features_position: bottom
      transparent: false
      feature_height: 36
      card_mod:
        style:
          ha-tile-info$: |
            .secondary {
              font-size: 1.4rem !important;
            }
    icon: mdi:calculator
    padding: 0em
  - type: custom:expander-card
    cards:
      - type: entities
        show_header_toggle: false
        entities:
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: masa madre
            row:
              type: section
              label: " "
              card_mod:
                style: |
                  .divider {
                    display: flex;
                    align-items: center;
                  }
                  .label::before {
                    content: "REFRESCO MASA MADRE";
                    font-weight: bold;
                    color: var(--accent-color);
                  }
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: biga
            row:
              type: section
              label: " "
              card_mod:
                style: |
                  .divider {
                    display: flex;
                    align-items: center;
                  }
                  .label::before {
                    content: "ELABORACIÓN BIGA";
                    font-weight: bold;
                    color: var(--accent-color);
                  }
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: poolish
            row:
              type: section
              label: " "
              card_mod:
                style: |
                  .divider {
                    display: flex;
                    align-items: center;
                  }
                  .label::before {
                    content: "ELABORACIÓN POOLISH";
                    font-weight: bold;
                    color: var(--accent-color);
                  }
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - condition: state
                entity: select.tipo_de_prefermento
                state: masa madre
            row:
              type: custom:template-entity-row
              entity: sensor.pan_inoculo_masa_madre
              name: • INÓCULO MASA MADRE
              state: "{{ states('sensor.pan_inoculo_masa_madre') }} g"
              tap_action:
                action: none
              card_mod:
                style: |
                  div.state {
                    font-size: 1.4rem !important;
                  }
                  .info {
                    font-size: 14px !important;
                    font-weight: bold !important;
                  }             
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
              - entity: select.tipo_de_prefermento
                state_not: masa madre
            row:
              type: custom:template-entity-row
              entity: sensor.pan_levadura_prefermento
              name: • LEVADURA PREFERMENTO
              state: "{{ states('sensor.pan_levadura_prefermento') }} g"
              tap_action:
                action: none
              card_mod:
                style: |
                  div.state {
                    font-size: 1.4rem !important;
                  }
                  .info {
                    font-size: 14px !important;
                    font-weight: bold !important;
                  }
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
            row:
              type: custom:template-entity-row
              entity: sensor.pan_harina_prefermento
              tap_action:
                action: none
              name: >-
                • HARINA ( {{ states('select.harina_para_prefermento') | upper
                }} )
              state: "{{ states('sensor.pan_harina_prefermento') }} g"
              card_mod:
                style: |
                  div.state {
                    font-size: 1.4rem !important;
                  }
                  .info {
                    font-size: 14px !important;
                    font-weight: bold !important;
                  }
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.prefermento
                above: 0
            row:
              type: custom:template-entity-row
              entity: sensor.pan_agua_prefermento
              name: • AGUA
              state: "{{ states('sensor.pan_agua_prefermento') }} g"
              tap_action:
                action: none
              card_mod:
                style: |
                  div.state {
                    font-size: 1.4rem !important;
                  }
                  .info {
                    font-size: 14px !important;
                    font-weight: bold !important;
                  }
          - type: section
            label: " "
            card_mod:
              style: |
                .divider {
                  display: flex;
                  align-items: center;
                }
                .label::before {
                  content: "{% set f = states('select.formula_de_receta') | trim %}{% if f in ['---', ''] %}MÉTODO EMPÍRICO {% else %}{{ f | replace('_', ' ') | upper }} {% endif %}";
                  font-weight: bold;
                  color: var(--accent-color);
                }
                .label::after {
                  content: "{{ states('number.masa_final_objetivo') | float(0) | round(0) }}g";
                  font-weight: bold;
