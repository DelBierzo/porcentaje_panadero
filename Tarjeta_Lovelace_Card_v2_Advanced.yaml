                        - 1.5
                      step: 0.05
                      styles: |-
                        .icon {
                          display: none;
                        }
                    - type: spinbox
                      entity_id: number.levadura_prefermento
                      icon: mdi:yeast
                      unit_of_measurement: "%"
                      tap_action:
                        action: perform-action
                        perform_action: number.set_value
                        data:
                          value: "{{ value | float }}"
                        target:
